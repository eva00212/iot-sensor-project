# RS485 Modbus RTU settings for the sensors wired directly to this
# Raspberry Pi's RS485 interface. Register map and scaling factors are
# defined in src/modbus_poller.py, not here — they're part of the sensor
# parsing logic, not a deployment-time setting.
#
# serial_port/baudrate/bytesize/parity/stopbits/timeout_seconds match
# rs485_weather_station.py's WeatherStationSensor exactly -- that script
# was independently verified against this exact hardware. Do not change
# timeout_seconds below its verified value (1.0) without re-testing on
# real hardware: modbus_poller.py previously shipped with 0.5s and every
# request timed out.

serial_port: "/dev/serial0"
baudrate: 4800
bytesize: 8
parity: "N"          # N, E, or O
stopbits: 1
timeout_seconds: 1.0  # response wait timeout per individual attempt -- matches the verified rs485_weather_station.py default

# Retry behavior for a single register-block read. Independent of
# poll_interval_seconds below -- this always retries the same number of
# times with the same delay between attempts, whether polling every 10s
# (dev/test) or every 600s (production). Exhausting all retries never
# stops the collector: that one reading is reported with
# device_fault = "true" (plus error_message) and normal operation resumes
# automatically on the next scheduled poll. This retry wrapper is layered
# on top of the verified single-transaction read below -- the reference
# rs485_weather_station.py script itself has no retries.
modbus_retry_count: 10          # attempts per register-block read before giving up
modbus_retry_delay_seconds: 1.5 # delay between retry attempts

inter_poll_delay_ms: 200    # min. gap between successive Modbus reads to
                             # different slaves on the shared bus. Matches
                             # the sensor manual's FAQ minimum ("host
                             # polling interval and response wait time
                             # must both be set to at least 200ms"). Each
                             # device is now read in a single 500-515
                             # block transaction, so this only applies
                             # between devices, not within one.

# How often to poll all 3 sensors. 10s here for easy dev/testing
# verification -- switch to 600 (10 minutes) for production.
poll_interval_seconds: 10
