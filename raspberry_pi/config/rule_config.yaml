ranges:
  temperature:     { min: -20,  max: 60   }
  humidity:        { min: 0,    max: 100  }
  co2:             { min: 0,    max: 5000 }
  wind_speed:      { min: 0,    max: null }
  solar_radiation: { min: 0,    max: null }

sudden_change:
  temperature:     5.0    # °C per interval
  humidity:        10.0   # % per interval
  co2:             300.0  # ppm per interval
  wind_speed:      10.0   # m/s per interval
  solar_radiation: 300.0  # W/m² per interval

indoor_cross_check:
  temperature: 2.5    # max allowed difference between device01 and device02
  humidity:    8.0
  co2:         200.0

missing_data:
  # Flag a device if no message is received within this many poll
  # intervals' worth of time (poll_interval_seconds, in modbus_config.yaml)
  # -- e.g. 3 missed cycles in a row, whether that's 30s at a 10s dev/test
  # interval or 30 minutes at a 600s production interval.
  timeout_multiplier: 3
